<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>てんさいれいだー</title>
    <style>
        
        :root {
            --bg: #ffffff;
            --container-bg: #ffffff;
            --text: #000000;
            --border: #e0e0e0;
            --input-bg: #ffffff;
            --accent: #000000;
            --radius: 12px;
            --log-text: #000000;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --container-bg: #000000;
            --text: #ffffff;
            --border: #333333;
            --input-bg: #000000;
            --accent: #ffffff;
            --log-text: #ffffff;
        }

        body {
            margin: 0; padding: 40px 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex; justify-content: center; min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        
        .theme-switch {
            position: fixed; top: 0; right: 0;
            cursor: pointer; padding: 10px 20px;
            border-bottom-left-radius: var(--radius);
            border-left: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            background: var(--container-bg);
            color: var(--text);
            font-size: 0.7em; font-weight: bold;
            z-index: 1000;
            text-transform: uppercase;
        }

        .container {
            background: var(--container-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%; max-width: 800px;
        }

        h2 {
            text-align: center; color: var(--text);
            text-transform: uppercase; letter-spacing: 6px;
            margin-bottom: 40px; font-weight: 300;
        }

        label {
            display: block; margin-top: 20px; font-size: 0.7em;
            color: var(--text); text-transform: uppercase; letter-spacing: 2px;
            font-weight: bold; opacity: 0.8;
        }

        textarea, input, select {
            width: 100%; padding: 14px;
            border: 1px solid var(--border);
            background: var(--input-bg); color: var(--text);
            border-radius: var(--radius);
            box-sizing: border-box; outline: none;
            transition: 0.2s; margin-top: 8px;
            font-size: 0.9em;
        }

        textarea:focus, input:focus { border-color: var(--accent); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }

        .checkbox-group {
            display: flex; flex-wrap: wrap; gap: 20px; margin: 25px 0;
            padding: 20px; border: 1px solid var(--border); border-radius: var(--radius);
        }

        .checkbox-group label { display: flex; align-items: center; cursor: pointer; color: var(--text); font-size: 0.8em; margin: 0; }
        input[type="checkbox"] { width: auto; margin-right: 10px; accent-color: var(--accent); }

        button {
            width: 100%; padding: 16px; border: 1px solid var(--border); cursor: pointer;
            font-weight: bold; transition: 0.3s; margin-top: 10px;
            text-transform: uppercase; letter-spacing: 2px;
            border-radius: var(--radius); background: transparent; color: var(--text);
        }

        button:hover { background: var(--text); color: var(--bg); }

        .btn-start { background: var(--accent) !important; color: var(--bg) !important; border: none; }
        .btn-start:hover { opacity: 0.8; }

        .btn-stop:disabled { opacity: 0.3; cursor: not-allowed; }

        #log {
            margin-top: 30px; height: 200px; overflow-y: auto;
            background: var(--input-bg); padding: 20px; font-size: 0.7em;
            border: 1px solid var(--border); color: var(--log-text);
            border-radius: var(--radius);
            line-height: 1.8; font-family: 'Consolas', monospace;
        }

        .log-error { color: #ff0000; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); }
    </style>
</head>
<body data-theme="dark">

<button class="theme-switch" onclick="toggleTheme()">てーまちぇんじ</button>

<div class="container">
    <h2>てんさいれいだー</h2>

    <label>とーくん</label>
    <textarea id="tokens" placeholder="1行に1つとーくんを配置"></textarea>

    <div class="grid">
        <div>
            <label>ちゃんねるID</label>
            <input type="text" id="channelId" placeholder="123456789...">
        </div>
        <div>
            <label>送信感覚(ms)</label>
            <input type="number" id="delay" value="1000">
        </div>
        <div>
            <label>めんしょん</label>
            <input type="number" id="mentionCount" value="2">
        </div>
    </div>

    <div class="checkbox-group">
        <label><input type="checkbox" id="enableRandomString" checked> らんだむ文字列</label>
        <label><input type="checkbox" id="enableRandomMention"> らんだむめんしょん</label>
        <label><input type="checkbox" id="enableRandomReply"> らんだむりぷらい <span id="historyCount">(0)</span></label>
    </div>

    <label>ゆーざーID(らんだむめんしょん)</label>
    <textarea id="userIds" placeholder="123456789..., 123456789..."></textarea>
    <button onclick="getUser()">ゆーざーIDとらんだむりぷらいのろぐを取得</button>

    <label>送信するめっせーじ</label>
    <textarea id="messages" placeholder="Raid By てんさい Join now!!, medicon on top join now"></textarea>

    <div class="grid">
        <button onclick="checkTokens()">とーくんちぇっかー</button>
        <select id="mode">
            <option value="1">全垢並行送信</option>
            <option value="2">全垢順次送信</option>
        </select>
    </div>

    <div class="grid" style="margin-top: 25px;">
        <button id="startBtn" class="btn-start" onclick="startRaiding()">すたーと</button>
        <button id="stopBtn" class="btn-stop" onclick="stopRaiding()" disabled>すとっぷ</button>
    </div>

    <div id="log">めいどばいいくら</div>
</div>

<script>
    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
    }

    let isRunning = false;
    let msgHistory = [];

    const logger = (m, type) => {
        const b = document.getElementById('log');
        const cls = type === 'error' ? 'log-error' : '';
        b.innerHTML = `<div class="${cls}">[${new Date().toLocaleTimeString()}] ${m}</div>` + b.innerHTML;
    };

// Random String 
const getRandomChar = () => {
    const charRanges = [
        [0x0621, 0x064A], [0x3041, 0x3096], [0xAC00, 0xD7A3],
        [0x3131, 0x314E], [0x4E00, 0x9FFF], [0x0905, 0x093F],
        [0x0E01, 0x0E2E], [0x0410, 0x044F], [0x0391, 0x03C9],
        [0x1200, 0x1248], [0x0531, 0x0556], [0x05D0, 0x05EA],
        [0xFF66, 0xFF9F], [0x0080, 0x00FF], [0x200B, 0x200D],
        [0xFEFF, 0xFEFF], [0x3099, 0x309A], [0x200E, 0x200F],
        [0xDB40, 0xDD00],
        [0x1F600, 0x1F64F], [0x1F300, 0x1F5FF], [0x1F680, 0x1F6FF],
        [0x1F900, 0x1F9FF], [0x2600, 0x26FF], [0x2700, 0x27BF],
        [0x25A0, 0x25FF], [0x2190, 0x21FF], [0x2000, 0x206F],
        [0x2980, 0x29FF], [0x2B00, 0x2BFF]
    ];
    const range = charRanges[Math.floor(Math.random() * charRanges.length)];  
    const codePoint = Math.floor(Math.random() * (range[1] - range[0] + 1)) + range[0];
    return String.fromCodePoint(codePoint);
};

const genRandomString = (length = 30) => {
    let s = "";
    for (let i = 0; i < length; i++) {
        s += getRandomChar();
    }
    return s;
};

    async function getUser() {
        const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
        const cid = document.getElementById('channelId').value.trim();
        if(!tks[0] || !cid) return alert("Configuration Missing.");
        
        logger("でーたを取得してます", "success");
        msgHistory = [];
        let uids = new Set();
        try {
            const r = await fetch(`https://discord.com/api/v9/channels/${cid}/messages?limit=100`, { 
                headers: { 'Authorization': tks[0].trim() } 
            });
            if (!r.ok) throw new Error();
            const data = await r.json();
            data.forEach(m => {
                msgHistory.push(m.id);
                uids.add(m.author.id);
            });
            document.getElementById('userIds').value = Array.from(uids).join(', ');
            document.getElementById('historyCount').innerText = `(${msgHistory.length})`;
            logger(`でーた取得成功: ${msgHistory.length} めっせーじ / ${uids.size} ゆーざー`, "success");
        } catch(e) { logger("でーた取得に失敗しました、権限不足やとーくん無効の可能性があります", "error"); }
    }

    function startRaiding() {
        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        logger("れいどがすたーとされました", "success");
        runLoop();
    }

    function stopRaiding() {
        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        logger("れいどがすとっぷされました", "error");
    }

    async function runLoop() {
        while (isRunning) {
            const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
            const cid = document.getElementById('channelId').value.trim();
            const dly = parseInt(document.getElementById('delay').value) || 1000;
            const msgInput = document.getElementById('messages').value;
            const msgsArray = msgInput.split(',').map(m => m.trim()).filter(m => m !== "");
            
            const tasks = tks.map(async (t) => {
                if(!isRunning) return;
                let baseMsg = msgsArray.length > 0 ? msgsArray[Math.floor(Math.random() * msgsArray.length)] : "てんさいれいだー";
                let content = baseMsg;
                if (document.getElementById('enableRandomString').checked) content += `\n${genRandomString()}`;
                
                if (document.getElementById('enableRandomMention').checked) {
                    const uids = document.getElementById('userIds').value.split(',').map(u => u.trim()).filter(u => u);
                    if(uids.length > 0) {
                        content += "\n";
                        for(let i=0; i<parseInt(document.getElementById('mentionCount').value); i++)
                            content += `<@${uids[Math.floor(Math.random() * uids.length)]}> `;
                    }
                }

                let body = { content: content };
                if (document.getElementById('enableRandomReply').checked && msgHistory.length > 0) {
                    body.message_reference = { channel_id: cid, message_id: msgHistory[Math.floor(Math.random() * msgHistory.length)] };
                }

                const shortToken = t.substring(0, 15) + "...";
                try {
                    const res = await fetch(`https://discord.com/api/v9/channels/${cid}/messages`, {
                        method: 'POST',
                        headers: { 'Authorization': t.trim(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if(res.ok) {
                        logger(`${shortToken} | ${cid} | ${content.substring(0,30).replace(/\n/g," ")}`, "success");
                    } else {
                        const err = await res.json();
                        logger(`えらー: ${shortToken} | ${res.status} | ${err.message}`, "error");
                    }
                } catch (e) { logger(`接続不可: ${shortToken}`, "error"); }
            });

            if(document.getElementById('mode').value === "1") {
                await Promise.all(tasks);
                await new Promise(r => setTimeout(r, dly));
            } else {
                for(let task of tasks) { 
                    if(!isRunning) break;
                    await task; 
                    await new Promise(r => setTimeout(r, dly / tks.length)); 
                }
            }
        }
    }

    async function checkTokens() {
        const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
        for (const t of tks) {
            try {
                const r = await fetch('https://discord.com/api/v9/users/@me', { headers: { 'Authorization': t.trim() } });
                logger(r.ok ? `有効: ${t.substring(0,15)}...` : `無効: ${t.substring(0,15)}...`, r.ok ? "success" : "error");
            } catch(e) { logger("ちぇっくえらー", "error"); }
        }
    }
</script>
</body>
</html>
